name: Daily Ingest Pipeline

on:
  schedule:
    # Run every day at 09:15 IST (03:45 UTC)
    - cron: '45 3 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

jobs:
  ingest:
    name: Scrape, Normalize, Chunk, Embed, Index
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create data directories
        run: |
          mkdir -p data/raw
          mkdir -p data/chroma
          mkdir -p data/structured
      
      - name: Run Phase 4.0 - Scrape
        env:
          INGEST_USER_AGENT: ${{ secrets.INGEST_USER_AGENT }}
        run: |
          python -m runtime.phase_4_0_scrape
      
      - name: Run Phase 4.1 - Normalize
        run: |
          python -m runtime.phase_4_1_normalize
      
      - name: Run Phase 4.2 - Chunk and Embed
        run: |
          python -m runtime.phase_4_2_chunk_embed
      
      - name: Run Phase 4.3 - Index to Chroma
        run: |
          python -m runtime.phase_4_3_index
      
      - name: Upload Chroma artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chroma-index
          path: data/chroma/
          retention-days: 30
      
      - name: Upload raw HTML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raw-html
          path: data/raw/
          retention-days: 7
      
      - name: Upload structured data artifacts
        uses: actions/upload-artifact@v4
        if: hashFiles('data/structured/**/*') != ''
        continue-on-error: true
        with:
          name: structured-data
          path: data/structured/
          retention-days: 30
